<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雪峰快跑</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #5a8f72;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    #game-container {
      width: 100%;
      height: 100%;
    }

    /* ---------- 主菜单 ---------- */
    #main-menu {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 clamp(1rem, 4vw, 3.5rem);
      pointer-events: none;
      transition: opacity 0.65s ease, visibility 0.65s ease;
    }

    #main-menu.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .menu-backdrop {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 70% 85% at 28% 50%,
        rgba(20, 40, 32, 0.04) 0%,
        rgba(20, 40, 32, 0.22) 55%,
        rgba(20, 40, 32, 0.48) 100%
      );
      pointer-events: none;
    }

    .menu-panel {
      position: relative;
      z-index: 1;
      width: min(420px, 38vw);
      text-align: center;
      padding: 2.4rem 2.8rem;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      pointer-events: auto;
      animation: menuFloat 4s ease-in-out infinite;
    }

    @keyframes menuFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    .menu-title {
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #f5fff8;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      margin-bottom: 0.6rem;
    }

    .menu-subtitle {
      font-size: 0.92rem;
      color: rgba(240, 255, 245, 0.78);
      margin-bottom: 1.4rem;
    }

    .menu-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem 1rem;
      margin-bottom: 1.6rem;
      font-size: 0.88rem;
      color: rgba(230, 245, 235, 0.9);
    }

    .menu-controls span {
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    #start-btn {
      min-width: 180px;
      padding: 0.85rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #1a3328;
      background: linear-gradient(180deg, #e8fff0 0%, #b8e6c8 100%);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    #start-btn:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    #start-btn:active:not(:disabled) {
      transform: translateY(0) scale(0.98);
    }

    #start-btn:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .menu-tip {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: rgba(220, 240, 228, 0.65);
    }

    @media (max-width: 720px) {
      #main-menu {
        justify-content: center;
        padding: 0 1rem;
      }

      .menu-panel {
        width: min(92vw, 420px);
      }
    }

    /* ---------- 游戏结束 ---------- */
    #gameover-panel {
      position: fixed;
      inset: 0;
      z-index: 18;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 20, 16, 0.45);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      pointer-events: none;
    }

    #gameover-panel.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .gameover-card {
      text-align: center;
      padding: 2rem 2.4rem;
      border-radius: 16px;
      background: rgba(30, 50, 40, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .gameover-card h2 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .gameover-card p {
      opacity: 0.85;
      margin-bottom: 1.2rem;
    }

    #restart-btn {
      padding: 0.65rem 1.6rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1a3328;
      background: #c8e6c9;
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }

    /* ---------- HUD ---------- */
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      pointer-events: none;
      line-height: 1.6;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #hud.hud--menu .hud-play {
      display: none;
    }

    #hud:not(.hud--menu) .hud-menu {
      display: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="main-menu">
    <div class="menu-backdrop"></div>
    <div class="menu-panel">
      <h1 class="menu-title">纪念张雪峰老师</h1>
      <p class="menu-subtitle">清晨森林 · 无尽跑酷</p>
      <div class="menu-controls">
        <span>A / D · 换道</span>
        <span>W · 跳跃</span>
        <span>S · 下滑</span>
      </div>
      <button id="start-btn" type="button" disabled>加载中…</button>
      <p class="menu-tip">角色正在缓慢旋转，可全方位预览建模</p>
    </div>
  </div>

  <div id="gameover-panel" hidden>
    <div class="gameover-card">
      <h2>撞到树木</h2>
      <p>按 R 或点击下方按钮重新开始</p>
      <button id="restart-btn" type="button">重新开始</button>
    </div>
  </div>

  <div id="hud">
    <div class="hud-menu">主菜单 · 点击「开始游戏」进入跑酷</div>
    <div class="hud-play">
      <div>← → / A D：左、中、右三条赛道平滑换道</div>
      <div>↑ / W：跳跃　↓ / S：下滑　　R：撞树后重新开始</div>
    </div>
    <div id="model-status" style="margin-top: 8px; color: #ffe082;">正在加载人物模型…</div>
    <div id="startup-hint" style="margin-top: 8px; color: #ffe082; display: none;">
      游戏脚本未加载。本地开发请运行 <strong>npm run dev</strong>；
      GitHub Pages 请部署 <strong>npm run build</strong> 生成的 <strong>dist</strong> 目录。
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "./node_modules/three/build/three.module.js",
        "three/addons/": "./node_modules/three/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="./src/game.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!document.querySelector('#game-container canvas')) {
          document.getElementById('startup-hint').style.display = 'block';
        }
      }, 1500);
    });
  </script>
</body>
</html>
