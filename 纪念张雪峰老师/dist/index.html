<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>熊大快跑 - 基础框架</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #game-container {
      width: 100%;
      height: 100%;
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      pointer-events: none;
      line-height: 1.6;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "./node_modules/three/build/three.module.js",
        "three/addons/": "./node_modules/three/examples/jsm/"
      }
    }
  </script>
  <script type="module" crossorigin src="/assets/index-3wuslP0-.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud">
    <div>← → / A D：左、中、右三条赛道平滑换道</div>
    <div>↑ / W：跳跃　　R：撞树后重新开始</div>
    <div id="model-status" style="margin-top: 8px; color: #ffe082;">正在加载人物模型…</div>
    <div id="startup-hint" style="margin-top: 8px; color: #ffe082; display: none;">
      游戏未加载成功。请双击项目里的 <strong>启动游戏.bat</strong>，
      或在终端运行 <strong>npm run dev</strong>，然后打开
      <strong>http://localhost:5173</strong>。
      不要直接双击 index.html，也不要用 Live Server。
    </div>
  </div>
  <!-- Live Server 等静态服务器需要 import map 才能解析 three 模块 -->

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!document.querySelector('#game-container canvas')) {
          document.getElementById('startup-hint').style.display = 'block';
        }
      }, 1500);
    });
  </script>
</body>
</html>
